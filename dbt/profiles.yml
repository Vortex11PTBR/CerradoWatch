cerradowatch:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'cerrado_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', '') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'cerradowatch') }}"
      schema: staging
      threads: 4
      sslmode: "{{ env_var('POSTGRES_SSLMODE', 'prefer') }}"

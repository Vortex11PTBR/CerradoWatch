name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cerradowatch_test
          POSTGRES_USER: cerrado_user
          POSTGRES_PASSWORD: test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check ingestion/ orchestration/ dashboard/

      - name: Type check (mypy)
        run: mypy ingestion/

      - name: Run tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: cerradowatch_test
          POSTGRES_USER: cerrado_user
          POSTGRES_PASSWORD: test_pass
        run: pytest

      - name: dbt deps (instala pacotes dbt)
        run: cd dbt && dbt deps

      - name: dbt compile (valida SQL dos modelos)
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: cerradowatch_test
          POSTGRES_USER: cerrado_user
          POSTGRES_PASSWORD: test_pass
        run: cd dbt && dbt compile --profiles-dir . --target dev

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dashboard image (valida Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: cerradowatch-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build pipeline image (valida Dockerfile.pipeline)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.pipeline
          push: false
          tags: cerradowatch-pipeline:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

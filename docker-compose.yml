services:
  postgres:
    image: postgres:16-alpine
    container_name: cerradowatch_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cerradowatch
      POSTGRES_USER: cerrado_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cerrado_dev_pass}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cerrado_user -d cerradowatch"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dashboard Streamlit ─────────────────────────────────────────────────
  app:
    build: .
    container_name: cerradowatch_app
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start-period: 20s
      retries: 3

  # ── Pipeline ETL + dbt (execução única) ─────────────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: cerradowatch_pipeline
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - pipeline

  # ── pgAdmin (opcional) ───────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cerradowatch_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cerradowatch.dev
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  pgdata:
